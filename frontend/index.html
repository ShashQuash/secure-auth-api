<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth API</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Floating hats canvas */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 7px 0;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: #ffffff;
            transition: border 0.2s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        input:focus {
            border-color: #ffd700;
            background: rgba(255,255,255,0.12);
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0px);
        }

        .btn-green { background-color: #4CAF50; color: white; }
        .btn-blue { background-color: #2196F3; color: white; }
        .btn-red { background-color: #e53935; color: white; }

        .alert {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
            display: none;
        }

        .alert-success { background-color: rgba(76,175,80,0.2); color: #81c784; }
        .alert-error { background-color: rgba(229,57,53,0.2); color: #ef9a9a; }

        .page { display: none; }
        .page.active { display: block; }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        .footer-text span {
            color: #ffd700;
            cursor: pointer;
        }

        .footer-text span:hover {
            text-decoration: underline;
        }

        .dashboard-box {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            color: #e0e0e0;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tag {
            display: inline-block;
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="card">

    <!-- Login -->
    <div id="loginPage" class="page active">
        <h1>🎓 Welcome Back</h1>
        <input type="text" id="loginUsername" placeholder="Enter your username" />
        <input type="password" id="loginPassword" placeholder="Enter your password"
               onkeydown="if(event.key==='Enter') handleLogin()" />
        <button class="btn-green" onclick="handleLogin()">Login</button>
        <div id="loginAlert" class="alert"></div>
        <div class="footer-text">
            New here? <span onclick="showPage('registerPage')">Create an account</span>
        </div>
    </div>

    <!-- Register -->
    <div id="registerPage" class="page">
        <h1>📋 Create Account</h1>
        <input type="text" id="registerUsername" placeholder="Choose a username" />
        <input type="password" id="registerPassword" placeholder="Choose a password"
               onkeydown="if(event.key==='Enter') handleRegister()" />
        <button class="btn-blue" onclick="handleRegister()">Register</button>
        <div id="registerAlert" class="alert"></div>
        <div class="footer-text">
            Already have an account? <span onclick="showPage('loginPage')">Login here</span>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="page">
        <h1>🏠 Dashboard</h1>
        <div class="dashboard-box">
            <div id="dashboardContent"></div>
            <br>
            <span class="tag">✅ Authenticated</span>
            <span class="tag">🔐 JWT Verified</span>
            <span class="tag">⚡ FastAPI</span>
        </div>
        <button class="btn-red" onclick="handleLogout()">Logout</button>
    </div>

</div>

<script>
  const API_URL = "https://secure-auth-api-clla.onrender.com";

    // ---- Floating Graduation Hats Background ----
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Mouse tracker
    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    // Graduation hat drawing function
    function drawGradHat(x, y, size, opacity, rotation) {
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.translate(x, y);
        ctx.rotate(rotation);

        // Hat board (flat top)
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(-size, 0);
        ctx.lineTo(size, 0);
        ctx.lineTo(size * 0.7, -size * 0.3);
        ctx.lineTo(-size * 0.7, -size * 0.3);
        ctx.closePath();
        ctx.fill();

        // Hat cap (square top)
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(-size * 0.5, -size * 0.3, size, -size * 0.5);

        // Tassel string
        ctx.strokeStyle = '#fff8dc';
        ctx.lineWidth = size * 0.08;
        ctx.beginPath();
        ctx.moveTo(size * 0.3, -size * 0.3);
        ctx.lineTo(size * 0.5, size * 0.2);
        ctx.stroke();

        // Tassel ball
        ctx.fillStyle = '#fff8dc';
        ctx.beginPath();
        ctx.arc(size * 0.5, size * 0.25, size * 0.12, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // Hat class
    class GradHat {
        constructor() {
            this.init();
        }

        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 18 + 10;
            this.speedX = (Math.random() - 0.5) * 0.6;
            this.speedY = (Math.random() - 0.5) * 0.6;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.015;
            this.opacity = Math.random() * 0.4 + 0.15;
            this.bobOffset = Math.random() * Math.PI * 2;
            this.bobSpeed = Math.random() * 0.02 + 0.01;
        }

        update(frame) {
            // Gentle bobbing motion
            this.y += Math.sin(frame * this.bobSpeed + this.bobOffset) * 0.3;
            this.x += this.speedX;
            this.rotation += this.rotationSpeed;

            // Mouse attraction — hats drift toward cursor gently
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 180) {
                this.x += dx * 0.008;
                this.y += dy * 0.008;
            }

            // Wrap around screen edges
            if (this.x < -50) this.x = canvas.width + 50;
            if (this.x > canvas.width + 50) this.x = -50;
            if (this.y < -50) this.y = canvas.height + 50;
            if (this.y > canvas.height + 50) this.y = -50;
        }

        draw() {
            drawGradHat(this.x, this.y, this.size, this.opacity, this.rotation);
        }
    }

    // Create hats
    const HAT_COUNT = 35;
    const hats = [];
    for (let i = 0; i < HAT_COUNT; i++) {
        hats.push(new GradHat());
    }

    // Animation loop
    let frame = 0;
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;
        hats.forEach(hat => {
            hat.update(frame);
            hat.draw();
        });
        requestAnimationFrame(animate);
    }

    animate();

    // ---- App Logic ----

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function showAlert(elementId, message, type) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.className = `alert alert-${type}`;
        el.style.display = 'block';
    }

    async function handleRegister() {
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value.trim();

        if (!username || !password) {
            showAlert('registerAlert', 'Please fill in all fields.', 'error');
            return;
        }

        const response = await fetch(`${API_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.error) {
            showAlert('registerAlert', data.error, 'error');
        } else {
            showAlert('registerAlert', 'Account created! Redirecting to login...', 'success');
            setTimeout(() => showPage('loginPage'), 1500);
        }
    }

async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!username || !password) {
        showAlert('loginAlert', 'Please fill in all fields.', 'error');
        return;
    }

    const response = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    // Handle all error cases — wrong password, user not found, account locked
    if (data.error) {
        showAlert('loginAlert', data.error, 'error');
    } else if (data.detail) {
        showAlert('loginAlert', data.detail, 'error');
    } else if (!data.access_token) {
        showAlert('loginAlert', 'Something went wrong. Please try again.', 'error');
    } else {
        localStorage.setItem('auth_token', data.access_token);
        loadDashboard();
    }
}

    async function loadDashboard() {
        const token = localStorage.getItem('auth_token');

        const response = await fetch(`${API_URL}/dashboard`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
            showPage('loginPage');
            return;
        }

        const data = await response.json();
        document.getElementById('dashboardContent').textContent = data.message + ' ' + data.data;
        showPage('dashboardPage');
    }

    function handleLogout() {
        localStorage.removeItem('auth_token');
        showPage('loginPage');
    }

    window.onload = function() {
        const token = localStorage.getItem('auth_token');
        if (token) loadDashboard();
    }
</script>

</body>
</html>
